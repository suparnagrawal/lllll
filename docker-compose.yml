services:
  db:
    image: postgres:17-alpine
    container_name: ura_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ura_user
      POSTGRES_PASSWORD: ura_pass
      POSTGRES_DB: ura_system
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ura_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ura_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://ura_user:ura_pass@db:5432/ura_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_before_production}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_before_production}
      FRONTEND_URL: http://localhost:5173
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ura_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
  redisdata: