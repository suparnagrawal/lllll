services:
  - type: web
    name: ura-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run db:deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DB_POOL_MAX
        value: "20"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
